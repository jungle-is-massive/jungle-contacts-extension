<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jungle — Save contact</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F2EB;
    --black: #111110;
    --green: #8BFF57;
    --green-dim: #5acc30;
    --white: #FAFAF7;
    --grey-light: #ECEAE3;
    --grey: #C8C4BB;
    --grey-mid: #888580;
    --border: #E2DFD8;
    --red: #e05c5c;
    --amber: #f5a623;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 380px;
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--cream);
    color: var(--black);
    font-size: 13px;
  }

  /* HEADER */
  .hdr {
    background: var(--black);
    padding: 14px 18px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .hdr .wordmark { font-size: 13px; font-weight: 800; color: var(--green); letter-spacing: -0.01em; }
  .hdr .wordmark span { color: rgba(255,255,255,0.4); font-weight: 400; }
  .hdr .label { font-family: 'DM Mono', monospace; font-size: 9px; color: rgba(255,255,255,0.5); text-transform: uppercase; letter-spacing: 0.12em; }

  /* BODY */
  .body { padding: 16px 18px 18px; }
  .status {
    font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--grey-mid); margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }
  .status::before {
    content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--amber);
  }
  .status.ok::before { background: var(--green-dim); }
  .status.err::before { background: var(--red); }

  /* FIELDS */
  .field { margin-bottom: 11px; }
  .field label {
    display: block;
    font-family: 'DM Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.12em;
    color: var(--grey-mid); margin-bottom: 4px;
  }
  .field input, .field select, .field textarea {
    width: 100%; padding: 8px 10px;
    border: 1.5px solid var(--border); border-radius: 7px;
    font-family: 'DM Sans', sans-serif; font-size: 12px;
    background: var(--white); color: var(--black);
  }
  .field textarea { min-height: 56px; resize: vertical; }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: var(--black);
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .required::after { content: ' *'; color: var(--red); }

  /* BUTTONS */
  .actions { display: flex; gap: 6px; margin-top: 14px; padding-top: 12px; border-top: 1px solid var(--border); }
  button {
    flex: 1;
    padding: 9px 12px; border-radius: 100px; border: none;
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 700;
    cursor: pointer; letter-spacing: -0.005em;
    transition: background 0.12s, color 0.12s, border-color 0.12s;
  }
  .btn-primary { background: var(--black); color: var(--green); }
  .btn-primary:hover:not(:disabled) { background: #000; }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { background: transparent; color: var(--black); border: 1.5px solid var(--border); }
  .btn-secondary:hover { border-color: var(--black); }

  /* TOAST / RESULT */
  .result {
    margin-top: 10px; padding: 10px 12px; border-radius: 8px;
    font-size: 12px; line-height: 1.4;
    display: none;
  }
  .result.ok { background: rgba(139,255,87,0.15); color: #2d6b00; border: 1px solid rgba(139,255,87,0.4); display: block; }
  .result.err { background: rgba(224,92,92,0.1); color: #9b1c1c; border: 1px solid rgba(224,92,92,0.3); display: block; }
  .result a { color: inherit; font-weight: 700; }

  /* EMPTY / NOT-ON-LINKEDIN STATE */
  .empty { padding: 24px 8px; text-align: center; }
  .empty-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
  .empty-desc { font-size: 12px; color: var(--grey-mid); line-height: 1.5; }
</style>
</head>
<body>

  <div class="hdr">
    <div class="wordmark">Jungle <span>/</span> Contacts</div>
    <div class="label" id="version-label">v—</div>
  </div>

<div class="body" id="body">
  <div class="status" id="status">Reading profile…</div>

  <form id="form" style="display:none">
    <div class="field">
      <label class="required">Intermediary</label>
      <select name="org_id" required id="org_id"></select>
    </div>

    <div class="field">
      <label class="required">Name</label>
      <input name="name" type="text" required id="name" />
    </div>

    <div class="field-row">
      <div class="field">
        <label>Title</label>
        <input name="title" type="text" id="title" />
      </div>
      <div class="field">
        <label>Role</label>
        <input name="role" type="text" id="role" placeholder="e.g. Decision maker" />
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>Warmth</label>
        <select name="warmth" id="warmth">
          <option value="warm">Warm</option>
          <option value="neutral" selected>Neutral</option>
          <option value="cold">Cold</option>
        </select>
      </div>
      <div class="field">
        <label>Influence</label>
        <select name="influence" id="influence">
          <option value="high">High</option>
          <option value="medium" selected>Medium</option>
          <option value="low">Low</option>
        </select>
      </div>
    </div>

    <div class="field">
      <label>LinkedIn URL</label>
      <input name="linkedin_url" type="url" id="linkedin_url" />
    </div>

    <div class="field">
      <label>Notes</label>
      <textarea name="notes" id="notes" placeholder="Why they matter, next step, anything that helps future-you…"></textarea>
    </div>

    <div class="actions">
      <button type="button" class="btn-secondary" id="cancel-btn">Close</button>
      <button type="submit" class="btn-primary" id="save-btn">Save contact</button>
    </div>

    <div class="result" id="result"></div>
  </form>

  <div class="empty" id="empty" style="display:none">
    <div class="empty-title">Open a LinkedIn profile</div>
    <div class="empty-desc">Navigate to any <strong>linkedin.com/in/…</strong> profile, then click the extension again to add them.</div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
